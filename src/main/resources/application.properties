spring.application.name=resource-server

# Resource Server runs on port 8082 (Server B)
server.port=8082

# JWT validation: Spring auto-discovers the JWKS endpoint and issuer via OIDC Discovery.
# The authorization server MUST be running at this URL before the resource server starts,
# OR spring.security.oauth2.resourceserver.jwt.jwk-set-uri can be used instead
# to avoid the startup-time discovery call.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000

# Logging for OAuth2 debugging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
